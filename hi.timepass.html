<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Missing You Cutu</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(to bottom, #ffe6e6, #ffcccc);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        h1 {
            color: #cc0000;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            color: #800000;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            border: 2px solid #cc0000;
            outline: none;
            text-align: center;
        }

        button {
            margin-top: 10px;
            padding: 10px 25px;
            font-size: 1rem;
            background-color: #cc0000;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #990000;
        }

        .rose {
            position: absolute;
            top: -50px;
            font-size: 30px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <h1>Missing u cutu ❤️</h1>
    <p>Type something special below 👇</p>

    <input type="text" id="loveInput" placeholder="Type 'I love u'">
    <button onclick="checkLove()">Enter</button>

    <script>
        function checkLove() {
            const text = document.getElementById("loveInput").value.toLowerCase().trim();
            if (text === "i love u" || text === "i love you") {
                startRoses();
            } else {
                alert("Type 'I love u' exactly 💕");
            }
        }

        function startRoses() {
            for (let i = 0; i < 30; i++) {
                createRose();
            }
        }

        function createRose() {
            const rose = document.createElement("div");
            rose.classList.add("rose");
            rose.innerHTML = "🌹";
            rose.style.left = Math.random() * 100 + "vw";
            rose.style.animationDuration = (Math.random() * 3 + 3) + "s";
            document.body.appendChild(rose);

            setTimeout(() => {
                rose.remove();
            }, 6000);
        }
    </script>

</body>
</html>
